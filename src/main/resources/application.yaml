server:
  port: ${TELEMETRIES_SERVER_PORT}

spring:
  config:
    import: optional:file:../.env
  application:
    name: greenhouse_telemetries
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${TELEMETRIES_SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        show_sql: true
        format_sql: true
        jdbc:
          batch_size: 20
          generate_statistics: true
  redis:
    host: ${REDIS_HOST}
    port: ${REDIS_PORT}
    jedis:
      pool:
        max-active: 10
        max-idle: 5
        min-idle: 1
    timeout: 60000

  mvc:
    hidden:
      method:
        filter:
          enabled: true

  security:
    jwt:
      secret: ${SECURITY_JWT}
  
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yaml
  cloud:
    openfeign:
      client:
        config:
          default:
            connect-timeout: 5000
            read-timeout: 5000
app:
  clients:
    inventory:
      devices:
        url: ${CLIENTS_INVENTORY_DEVICES}